name: phase1-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify-phase1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Phase1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify
        run: mvn -B -ntp clean verify

